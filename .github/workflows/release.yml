name: 자동 소스코드 릴리즈 (Auto Release)

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-and-release:
    name: 릴리즈 빌드 및 배포
    runs-on: ubuntu-latest
    steps:
      - name: 레포지토리 코드 가져오기 (Checkout)
        uses: actions/checkout@v4

      - name: 소스코드 압축 파일 생성
        run: |
          # 1. 아카이브 도중 파일 변경 에러(tar: file changed)를 방지하기 위해 임시 폴더(/tmp)에 생성함.
          zip -r /tmp/pastebox-krfs-source.zip . -x "*.git*"
          tar -czvf /tmp/pastebox-krfs-source.tar.gz --exclude=.git .
          
          # 2. 생성된 압축 파일을 현재 워크스페이스로 다시 가져옴
          mv /tmp/pastebox-krfs-source.zip .
          mv /tmp/pastebox-krfs-source.tar.gz .

      - name: 공식 릴리즈 생성 (태그 전용)
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            pastebox-krfs-source.zip
            pastebox-krfs-source.tar.gz

      - name: 최신 빌드 업데이트 (커밋 및 PR 전용)
        uses: softprops/action-gh-release@v2
        if: "!startsWith(github.ref, 'refs/tags/')"
        with:
          tag_name: latest
          name: "Latest Build (Auto-generated)"
          body: "자동으로 압축된 최신 소스코드입니다."
          prerelease: true
          files: |
            pastebox-krfs-source.zip
            pastebox-krfs-source.tar.gz
