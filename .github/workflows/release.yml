name: Auto Release Source

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Source Archive
        run: |
          # 1. 아카이브 도중 파일 변경 에러(tar: file changed)를 방지하기 위해 임시 폴더(/tmp)에 생성함.
          zip -r /tmp/pastebox-krfs-source.zip . -x "*.git*"
          tar -czvf /tmp/pastebox-krfs-source.tar.gz --exclude=.git .
          
          # 2. 생성된 압축 파일을 현재 워크스페이스로 다시 가져옴
          mv /tmp/pastebox-krfs-source.zip .
          mv /tmp/pastebox-krfs-source.tar.gz .

      - name: Create Release (For Tags)
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            pastebox-krfs-source.zip
            pastebox-krfs-source.tar.gz

      - name: Update Latest Release (For Commits & PRs)
        uses: softprops/action-gh-release@v2
        if: "!startsWith(github.ref, 'refs/tags/')"
        with:
          tag_name: latest
          name: "Latest Build (Auto-generated)"
          body: "자동으로 압축된 최신 소스코드입니다."
          prerelease: true
          files: |
            pastebox-krfs-source.zip
            pastebox-krfs-source.tar.gz
