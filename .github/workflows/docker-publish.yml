name: 도커 이미지 자동 발행 (Publish)

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: 이미지 빌드 및 배포
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 레포지토리 코드 가져오기 (Checkout)
        uses: actions/checkout@v4

      - name: 도커 Buildx 환경 설정
        uses: docker/setup-buildx-action@v3

      - name: 컨테이너 레지스트리(GHCR) 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 도커 이미지 태그 및 메타데이터 추출
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') || github.ref == format('refs/heads/{0}', 'master') }}
            type=ref,event=tag

      - name: 도커 이미지 빌드 및 업로드 (Push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
