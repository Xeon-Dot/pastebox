# Pastebox 환경 설정 예제 파일 (key=value 형태)

# 저장소 모드 (local: 로컬 파일, db: MariaDB 연동 + 압축)
STORAGE_MODE=local

# 서버 수신 대기 주소
LISTEN_ADDR=:8080

# 로컬 저장소 모드 전용: 데이터 저장 디렉토리 경로
DATA_DIR=./data

# 파일 만료 기간 (일)
EXPIRE_DAYS=30

# 데이터베이스 모드 전용: MariaDB DSN 연결 정보
DB_DSN=root:password@tcp(127.0.0.1:3306)/pastebox?parseTime=true

# 데이터베이스 모드 전용: 압축 알고리즘 (none, gzip, zstd 중 선택)
DB_COMPRESSION_ALGORITHM=zstd

# 관리자 모드 전용: 마스터 로그인 토큰 (공백인 경우 기동 시 자동으로 256자 토큰 생성 및 저장됨)
ADMIN_TOKEN=

# 최대 업로드 허용 용량 (단위: MB)
MAX_UPLOAD_SIZE_MB=10

# 업로드 rate limiting (초당 허용 요청 수 / 버스트 크기)
# RATE_LIMIT_PER_SEC=2
# RATE_LIMIT_BURST=10
